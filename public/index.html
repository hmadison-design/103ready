<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>103 Ready — Know It All</title>
<meta name="description" content="Choose Your Own Adventure training scenarios for general aviation pilots.">
<style>
  :root {
    --accent: #1A3C57;
    --accent-hover: #2E5C82;
  }
  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
  }
  body {
    background: #000;
    color: #ddd;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2vh 4vw;
    box-sizing: border-box;
  }
  .wrap {
    text-align: center;
    width: 100%;
    max-width: 900px;
  }
  .logo {
    height: 50vh;
    max-height: 520px;
    max-width: 90vw;
    width: auto;
    display: block;
    margin: 0 auto 3vh;
  }
  nav ul {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  nav li {
    margin: 0.9em 0;
  }
  nav a {
    color: var(--accent);
    text-decoration: none;
    font-size: clamp(1.25rem, 2.6vw, 1.9rem);
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 0.35em 0.6em;
    border-radius: 4px;
    transition: color 0.2s ease, background 0.2s ease;
  }
  nav a:hover, nav a:focus {
    color: #fff;
    background: var(--accent);
    outline: none;
  }
  footer {
    margin-top: 4vh;
    color: #555;
    font-size: 0.8rem;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
<main class="wrap">
  <img class="logo" src="103ready_logo.svg" alt="103 Ready — Know It All">
  <nav>
    <ul>
      <li><a href="game-day.html">Game Day</a></li>
      <li><a href="the-wall.html">The Wall</a></li>
      <li><a href="cylinder-three.html">Cylinder Three</a></li>
      <li><a href="breakfast-at-coulter.html">Breakfast at Coulter</a></li>
      <li><a href="blue-line.html">The Blue Line</a></li>
      <li><a href="third-face.html">The Third Face</a></li>
    </ul>
  </nav>
  <footer>For general aviation pilots. Training fiction — not a substitute for PIC judgement.</footer>
</main>
</body>
</html>
